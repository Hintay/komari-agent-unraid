name: Release

on:
  push:
    tags: ['20[0-9][0-9].*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Build plugin package
        run: |
          bash tools/build-plugin.sh "$GITHUB_REF_NAME" "$GITHUB_REPOSITORY"
          xmllint --noout plugin/komari-agent.plg

      - name: Generate release notes
        run: |
          prev_tag=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -n "$prev_tag" ]; then range="${prev_tag}..${GITHUB_REF_NAME}"; else range="${GITHUB_REF_NAME}"; fi
          subs=$(git log --format='%s' --no-decorate $range)
          ucfirst() { awk '{print "- " toupper(substr($0,1,1)) substr($0,2)}'; }
          feat=$(echo "$subs" | grep -E '^feat(\(|:)' | sed 's/^feat[^:]*:[[:space:]]*//' | ucfirst || true)
          fix=$(echo "$subs" | grep -E '^fix(\(|:)' | sed 's/^fix[^:]*:[[:space:]]*//' | ucfirst || true)
          improve=$(echo "$subs" | grep -E '^(refactor|simplify|perf)(\(|:)' | sed 's/^[a-z]*[^:]*:[[:space:]]*//' | ucfirst || true)
          other=$(echo "$subs" | grep -vE '^(feat|fix|refactor|simplify|perf|build|ci|test|docs|chore|style)(\(|:)' | ucfirst || true)
          {
            [ -n "$feat" ] && printf '## New Features\n%s\n\n' "$feat"
            [ -n "$fix" ] && printf '## Bug Fixes\n%s\n\n' "$fix"
            [ -n "$improve" ] && printf '## Improvements\n%s\n\n' "$improve"
            [ -n "$other" ] && printf '## Other\n%s\n\n' "$other"
            echo "---"
            echo
            echo "Install via **Plugins -> Install Plugin** with the \`.plg\` URL (see the README)."
          } > RELEASE_NOTES.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            build/komari-agent.txz \
            plugin/komari-agent.plg \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md
